# goreleaser v2 — the canonical base config (pure Go, CGO_ENABLED=0). Layer
# recipes on top (zig CGO, build tags, universal binaries, embed-prebuild) per
# reference/go-ci-and-release.md. Validate locally: goreleaser release --snapshot --clean
version: 2

project_name: cc-present

# The web SPA must be built before `go build`: //go:embed all:internal/web/dist
# reads at compile time, so the dist dir must be fresh first. goreleaser runs
# these before hooks once, before any build (the release workflow sets up bun).
before:
  hooks:
    - bash -c 'cd web && bun install --frozen-lockfile && bunx vite build'
    - go mod tidy

builds:
  - id: cc-present
    main: ./cmd/cc-present
    binary: cc-present
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/yasyf/cc-present/internal/version.Version={{ .Version }}
      - -X github.com/yasyf/cc-present/internal/version.Commit={{ .Commit }}
      - -X github.com/yasyf/cc-present/internal/version.Date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  # Bare per-arch binaries named cc-present_<os>_<arch> — the Claude Code plugin's
  # plugin/scripts/install-binary.sh fetches these directly from the release:
  #   https://github.com/yasyf/cc-present/releases/download/v${VERSION}/cc-present_${OS}_${ARCH}
  - id: binary
    ids:
      - cc-present
    formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
  # A normal tar.gz archive for general use (and the Homebrew cask).
  - id: archive
    ids:
      - cc-present
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

# Sign and notarize every Darwin binary with our Apple Developer ID before publication.
# goreleaser's built-in quill signer is pure Go and runs on the linux runner (no macOS runner).
# REQUIRES a full-chain p12 (leaf + Developer ID intermediate + Apple Root CA): without the
# root, quill emits an unsatisfiable `certificate root[…6.2.6…]` designated requirement that
# macOS SIGKILLs at exec. Bare-binary only (no .app bundle). See reference/go-ci-and-release.md.
notarize:
  macos:
    - enabled: true
      ids:
        - cc-present
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

checksum:
  name_template: checksums.txt

# Default distribution: a native Homebrew cask published by goreleaser itself to the
# shared tap (no render/publish step). A cask ships the prebuilt binary as-is. Switch to a
# formula (native `brews:`, or a rendered `.rb` via the render-formula action) only when you
# need `brew services`, a runtime `depends_on`, or conditional install — see
# reference/go-ci-and-release.md § Formula recipe.
homebrew_casks:
  - name: cc-present
    # Use the tar.gz archive (not the bare binary) for the cask: two archives
    # cover each OS/Arch, so the cask must pick one.
    ids:
      - archive
    binaries:
      - cc-present
    repository:
      owner: yasyf
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/yasyf/cc-present
    description: Approval boards where every click streams back to the agent.
release:
  prerelease: auto
  # Idempotent re-runs: overwrite same-named assets instead of erroring (HTTP 422). The shared
  # release-go.yml retries `goreleaser release --clean` past flaky notarization, and a rare
  # mid-publish failure would otherwise 422 on the retry's asset re-upload.
  replace_existing_artifacts: true

changelog:
  use: github
