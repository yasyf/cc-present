# Commit-time checks for Go: gofumpt + goimports formatting and golangci-lint.
# Run by prek — a fast Rust drop-in for pre-commit that reads this file unchanged.
# Activate once per clone:  uvx prek install
# The rev pins the golangci-lint version; bump it with `uvx prek autoupdate`.
repos:
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint-fmt
      - id: golangci-lint

  # Commit-time checks for Swift (ios/): SwiftFormat (nicklockwood) + SwiftLint.
  # Deliberately `repo: local` + `language: system` against the brew-installed
  # binaries (brew install swiftformat swiftlint): the upstream repos' pre-commit
  # hooks build the tools from source via SPM on first run (minutes-long), so the
  # local-system form is the fast path. Don't "upgrade" this to the remote hooks.
  - repo: local
    hooks:
      - id: swiftformat
        name: swiftformat
        entry: swiftformat
        language: system
        types: [swift]
        files: ^ios/
      - id: swiftlint
        name: swiftlint
        entry: swiftlint --quiet
        language: system
        types: [swift]
        files: ^ios/
