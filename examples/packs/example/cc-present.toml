host_api = 2
name = "example"
version = "0.2.0"
description = "Reference block pack: a toned callout, an interactive rating, and a two-step survey wizard."
entry = "dist/pack.js"
reference = "reference/blocks.md"

[blocks.callout]
description = "A toned admonition (info / warn / success) that renders Markdown."
schema = "schema/callout.json"
examples = ["examples/callout.json"]

[blocks.rating]
description = "An interactive N-point rating; the human's pick streams back."
schema = "schema/rating.json"
interaction = "schema/rating.interaction.json"
examples = ["examples/rating.json"]

[blocks.survey]
description = "A two-step wizard exercising the hostApi 2 surface: tokens, toast, and usePackState draft persistence."
schema = "schema/survey.json"
interaction = "schema/survey.interaction.json"
examples = ["examples/survey.json"]
