name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7

      # Web build first: //go:embed all:internal/web/dist reads at compile time,
      # so the embed dir must be fresh before the Go build/test/vet run. The Go
      # steps still pass from a clean tree without this, against the committed
      # placeholder index.html.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Build web SPA
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          bunx vitest run
          bunx vite build
      - name: Build example pack
        run: |
          cd examples/packs/example
          bun install
          bun run typecheck
          bun run build
          bun run smoke
      - name: Guard embedded dist size
        run: |
          bytes=$(tar -c internal/web/dist | gzip -9 | wc -c | tr -d ' ')
          limit=$((2 * 1024 * 1024))
          echo "gzipped internal/web/dist: ${bytes} bytes (limit ${limit})"
          if [ "${bytes}" -gt "${limit}" ]; then
            echo "::error::internal/web/dist gzips to ${bytes} bytes, exceeds ${limit}"
            exit 1
          fi

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race ./...
      - name: Build
        run: go build ./...
      - name: Lint example pack
        run: go run ./cmd/cc-present pack lint examples/packs/example
      # Prove `pack init` scaffolds a build-correct pack verbatim: scaffold into
      # RUNNER_TEMP (present on both runners), build/smoke it, then lint it. go
      # run stays at the repo root (bun set up earlier); the bun steps run in a
      # subshell so go run keeps its module context.
      - name: Scaffold pack (pack init)
        run: |
          pack_dir="$RUNNER_TEMP/ci-pack"
          go run ./cmd/cc-present pack init --name ci-smoke "$pack_dir"
          ( cd "$pack_dir" && bun install && bun run build && bun run smoke )
          go run ./cmd/cc-present pack lint "$pack_dir"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
