name: TestFlight (iOS)

# Manual-only lane that archives the app and uploads the build to TestFlight via
# App Store Connect. Cloud signing (-allowProvisioningUpdates + an App Store
# Connect API key) means no certificates or provisioning profiles live in CI.
# The archive is ad-hoc signed (a dev profile would need a registered device);
# export re-signs it for distribution via cloud-managed signing.
# Pinned to macos-26 for the Xcode 26.x toolchain this app targets.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upload:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Write App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/asc_authkey.p8"
          printf '%s' "$ASC_KEY_P8" > "$KEY_PATH"
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Archive (cloud signing)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: >
          xcodebuild archive
          -project ios/CcPresent.xcodeproj
          -scheme CcPresent
          -destination 'generic/platform=iOS'
          -archivePath build/CcPresent.xcarchive
          -allowProvisioningUpdates
          -authenticationKeyPath "$ASC_KEY_PATH"
          -authenticationKeyID "$ASC_KEY_ID"
          -authenticationKeyIssuerID "$ASC_ISSUER_ID"
          CODE_SIGN_IDENTITY=-
          AD_HOC_CODE_SIGNING_ALLOWED=YES
          DEVELOPMENT_TEAM="$APPLE_TEAM_ID"
          CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER"

      - name: Export and upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: >
          xcodebuild -exportArchive
          -archivePath build/CcPresent.xcarchive
          -exportOptionsPlist ios/ExportOptions.plist
          -exportPath build/export
          -allowProvisioningUpdates
          -authenticationKeyPath "$ASC_KEY_PATH"
          -authenticationKeyID "$ASC_KEY_ID"
          -authenticationKeyIssuerID "$ASC_ISSUER_ID"
