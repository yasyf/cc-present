name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    uses: yasyf/homebrew-tap/.github/workflows/release-go.yml@0b6b92d05b44c72496c5201f7e6471520f662beb
    secrets: inherit
    # The goreleaser before-hook builds the go:embed web SPA with bun, so the
    # shared workflow must put bun on PATH before it runs goreleaser.
    with:
      setup-bun: true
      plugin-manifest: plugin/.claude-plugin/plugin.json

  # The scaffolded release job forwards to a reusable workflow that can't take
  # extra steps, so the binrun descriptor refresh runs as a follow-on job. It
  # refreshes the committed descriptor (plugin/bin/cc-present.binrun) to pin the
  # just-released version and moves the plugin manifest to the same version in
  # the same commit. It gates on `release` (rather than a `release: published`
  # trigger) because a release goreleaser creates with the default GITHUB_TOKEN
  # does not fire `release` events for other workflows. Both files are committed
  # back to main — the plugin marketplace serves main HEAD, so the pin must live
  # in-tree — and the descriptor is uploaded to the release for parity with
  # binrun. Bumping plugin.json here (not in a separate hand commit) keeps it in
  # lockstep with the descriptor, so the CI agreement gate stays green after
  # every release.
  descriptor:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Download release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
            --dir dist --pattern '*.tar.gz' --pattern 'checksums.txt'
      - name: Render descriptor and sync manifest version
        run: |
          version="${GITHUB_REF_NAME#v}"
          plugin/scripts/render-descriptor.sh dist "$version" > plugin/bin/cc-present.binrun
          chmod +x plugin/bin/cc-present.binrun
          jq --arg v "$version" '.version = $v' plugin/.claude-plugin/plugin.json > plugin/.claude-plugin/plugin.json.tmp
          mv plugin/.claude-plugin/plugin.json.tmp plugin/.claude-plugin/plugin.json
      - name: Validate descriptor
        run: go run github.com/yasyf/binrun/cmd/binrun@v0.1.1 -- parse plugin/bin/cc-present.binrun
      - name: Commit refreshed descriptor and manifest to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- plugin/bin/cc-present.binrun plugin/.claude-plugin/plugin.json; then
            echo "descriptor and manifest already current for ${GITHUB_REF_NAME}"
          else
            git add plugin/bin/cc-present.binrun plugin/.claude-plugin/plugin.json
            git commit -m "chore: sync cc-present.binrun + manifest to ${GITHUB_REF_NAME}"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Upload descriptor to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" plugin/bin/cc-present.binrun --repo "${GITHUB_REPOSITORY}" --clobber
