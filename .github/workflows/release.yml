name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    uses: yasyf/homebrew-tap/.github/workflows/release-go.yml@8f422c652d836c40f9cc5a9d893d4120b26bc681
    secrets: inherit
    # The goreleaser before-hook builds the go:embed web SPA with bun, so the
    # shared workflow must put bun on PATH before it runs goreleaser.
    with:
      setup-bun: true
      plugin-manifest: plugin/.claude-plugin/plugin.json
