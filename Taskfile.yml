version: '3'

# The web SPA MUST be built before the Go binary: //go:embed all:internal/web/dist
# reads at compile time, so a stale or empty dist gets baked into the binary
# otherwise. `build` runs build-web then build-go so the order is enforced. A
# clean tree still compiles against the committed placeholder index.html when the
# web toolchain is absent.

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  LDFLAGS: >-
    -s -w
    -X github.com/yasyf/cc-present/internal/version.Version={{.VERSION}}
    -X github.com/yasyf/cc-present/internal/version.Commit={{.COMMIT}}

tasks:
  build:
    desc: Build the SPA then the binary (order is load-bearing for go:embed)
    cmds:
      - task: build-web
      - task: build-go

  build-web:
    desc: Install web deps and build the SPA into internal/web/dist
    dir: web
    cmds:
      - bun install
      - bunx vite build

  build-go:
    desc: Build the binary into ./bin (embeds whatever is in internal/web/dist)
    cmds:
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o bin/cc-present ./cmd/cc-present

  test:
    desc: Run the test suite with the race detector
    cmds:
      - go test -race -count=1 ./...

  vet:
    desc: Vet the module
    cmds:
      - go vet ./...

  lint:
    desc: Lint with golangci-lint
    cmds:
      - golangci-lint run

  fmt:
    desc: Format with gofumpt + goimports (via golangci-lint)
    cmds:
      - golangci-lint fmt

  ci:
    desc: Everything CI runs
    cmds:
      - task: vet
      - task: lint
      - task: test
      - task: build
